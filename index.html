    <!-- Suppress benign sandbox-related WebSocket or connection failures -->
    <script>
      (function() {
        var isBenign = function(msg) {
          if (!msg) return false;
          var m = String(msg).toLowerCase();
          return m.indexOf('websocket') !== -1 || 
                 m.indexOf('closed without opened') !== -1 || 
                 m.indexOf('failed to connect to websocket') !== -1 ||
                 m.indexOf('[vite] connection failed') !== -1 ||
                 m.indexOf('hmr') !== -1;
        };
        window.addEventListener('unhandledrejection', function(e) {
          var reason = (e.reason && (e.reason.message || e.reason)) || '';
          if (isBenign(reason)) {
            e.preventDefault();
            e.stopImmediatePropagation();
            e.stopPropagation();
          }
        }, true);
        window.addEventListener('error', function(e) {
          var msg = e.message || '';
          if (isBenign(msg)) {
            e.preventDefault();
            e.stopImmediatePropagation();
            e.stopPropagation();
          }
        }, true);
      })();
    </script>
